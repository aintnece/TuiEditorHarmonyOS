<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WYSIWYG Editor</title>
  <link rel="stylesheet" href="https://wweditor.local/toastui-editor.min.css">
  <link rel="stylesheet" href="https://wweditor.local/toastui-editor-dark.css" id="tui-dark-css" disabled>
  <link rel="stylesheet" href="https://wweditor.local/toastui-editor-plugin-code-syntax-highlight.min.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #editor {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    /* Hide tui.editor built-in toolbar — driven by native ArkTS Toolbar */
    .toastui-editor-toolbar {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="editor"></div>

  <script src="https://wweditor.local/toastui-editor-all.min.js"></script>
  <script src="https://wweditor.local/toastui-editor-plugin-code-syntax-highlight-all.min.js"></script>
  <script>
    (function () {
      // ── Window-flag + content-compare change suppression ──
      // programmaticSet stays true across all synchronous + microtask change
      // events triggered during setMarkdown; the setTimeout(0) macro-task
      // closes the window and re-captures lastSetMd after the engine settles.
      var lastSetMd = "";
      var programmaticSet = false;

      // Parse ?theme=dark|light from URL query string
      var queryTheme = 'light';
      if (location.search.indexOf('theme=dark') !== -1) {
        queryTheme = 'dark';
      }

      // Initialize tui.editor — WYSIWYG only, no built-in toolbar
      try {
        var EditorCtor = (toastui.Editor && toastui.Editor.default) ? toastui.Editor.default : toastui.Editor;
        var plugins = [];
        if (toastui.Editor.plugin && toastui.Editor.plugin.codeSyntaxHighlight) {
          plugins.push(toastui.Editor.plugin.codeSyntaxHighlight);
        }
        var ed = new EditorCtor({
          el: document.getElementById('editor'),
          initialEditType: 'wysiwyg',
          previewStyle: 'vertical',
          hideModeSwitch: true,
          height: '100%',
          initialValue: '',
          toolbarItems: [],
          plugins: plugins
        });
      } catch (e) {
        console.error('ww init failed', e);
        return; // don't set up bridge if init failed
      }

      // ── Global bridge API ──
      window.__ww = {
        /** Inject markdown content into wysiwyg (convert=false to keep raw markdown).
         *  Sets programmaticSet window-flag before the call; the change handler
         *  suppresses all events during the window, then compares settled content. */
        setMarkdown: function (md) {
          programmaticSet = true;
          ed.setMarkdown(md || "", false);
          lastSetMd = ed.getMarkdown();
          setTimeout(function () {
            lastSetMd = ed.getMarkdown();
            programmaticSet = false;
          }, 0);
        },

        /** Get current content as markdown string */
        getMarkdown: function () {
          return ed.getMarkdown();
        },

        /** Toggle dark theme: enable/disable dark CSS + toggle body class */
        setTheme: function (dark) {
          var darkLink = document.getElementById('tui-dark-css');
          if (darkLink) {
            darkLink.disabled = !dark;
          }
          if (dark) {
            document.body.classList.add('toastui-editor-dark');
          } else {
            document.body.classList.remove('toastui-editor-dark');
          }
        },

        /** Focus the editor */
        focus: function () {
          ed.focus();
        },

        /** Execute a tui.editor command (for batch 5 toolbar integration).
         *  payloadJson is an optional JSON string of the command payload. */
        exec: function (name, payloadJson) {
          var p;
          try { p = payloadJson ? JSON.parse(payloadJson) : undefined; } catch (e) { p = undefined; }
          ed.exec(name, p);
        }
      };

      // ── JS→ArkTS bridge: relay tui.editor changes to native side ──
      ed.on('change', function () {
        if (programmaticSet) return;
        var cur = ed.getMarkdown();
        if (cur === lastSetMd) return;
        if (window.nativeBridge && window.nativeBridge.onChange) {
          try { window.nativeBridge.onChange(cur); } catch (e) {}
        }
      });

      // Apply initial theme from URL query
      window.__ww.setTheme(queryTheme === 'dark');
    })();
  </script>
</body>
</html>
