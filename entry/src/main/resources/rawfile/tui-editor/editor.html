<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WYSIWYG Editor</title>
  <link rel="stylesheet" href="https://wweditor.local/toastui-editor.min.css">
  <link rel="stylesheet" href="https://wweditor.local/toastui-editor-dark.css" id="tui-dark-css" disabled>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #editor {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    /* Hide tui.editor built-in toolbar — driven by native ArkTS Toolbar */
    .toastui-editor-toolbar {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="diag" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#222;color:#0f0;font:11px monospace;padding:2px 4px;white-space:pre-wrap;max-height:40%;overflow:auto">DIAG: </div>
  <div id="editor"></div>

  <script src="https://wweditor.local/toastui-editor-all.min.js"></script>
  <script>
    // ── Global error capture ──
    window.onerror = function(m, src, ln, col, e) {
      diag("ERR:" + m + "@" + ln + ":" + col);
      return false;
    };

    // ── Diagnostic helper ──
    function diag(s) {
      var d = document.getElementById("diag");
      if (d) d.textContent += s + " | ";
    }

    // ── Signal that HTML is being parsed/rendered ──
    diag("page-js-start");
  </script>
  <script>
    (function () {
      // Parse ?theme=dark|light from URL query string
      var queryTheme = 'light';
      if (location.search.indexOf('theme=dark') !== -1) {
        queryTheme = 'dark';
      }

      // Initialize tui.editor — WYSIWYG only, no built-in toolbar
      try {
        var EditorCtor = (toastui.Editor && toastui.Editor.default) ? toastui.Editor.default : toastui.Editor;
        var ed = new EditorCtor({
          el: document.getElementById('editor'),
          initialEditType: 'wysiwyg',
          previewStyle: 'vertical',
          hideModeSwitch: true,
          height: '100%',
          initialValue: '',
          toolbarItems: []
        });
        diag("init-ok");
      } catch(e) {
        diag("init-ERR:" + e.message);
        return; // don't set up bridge if init failed
      }

      // ── Global bridge API (batch 3 extends this) ──
      window.__ww = {
        /** Inject markdown content into wysiwyg (convert=false to keep raw markdown) */
        setMarkdown: function (md) {
          ed.setMarkdown(md || '', false);
        },

        /** Get current content as markdown string */
        getMarkdown: function () {
          return ed.getMarkdown();
        },

        /** Toggle dark theme: enable/disable dark CSS + toggle body class */
        setTheme: function (dark) {
          var darkLink = document.getElementById('tui-dark-css');
          if (darkLink) {
            darkLink.disabled = !dark;
          }
          if (dark) {
            document.body.classList.add('toastui-editor-dark');
          } else {
            document.body.classList.remove('toastui-editor-dark');
          }
        },

        /** Focus the editor */
        focus: function () {
          ed.focus();
        }
      };

      // Apply initial theme from URL query
      window.__ww.setTheme(queryTheme === 'dark');

      // ── Diagnostics after layout settles ──
      setTimeout(function () {
        diag("sheets=" + document.styleSheets.length);
        diag("bodyH=" + getComputedStyle(document.body).height);
        var ui = document.querySelector(".toastui-editor-defaultUI");
        diag("uiH=" + (ui ? getComputedStyle(ui).height : "NO-UI"));
        var ww = document.querySelector(".toastui-editor-ww-container");
        diag("wwH=" + (ww ? getComputedStyle(ww).height : "NO-WW"));
      }, 200);
    })();
  </script>
</body>
</html>
